name: Build Travian Legends APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build-debug:
    name: "Build Debug APK (Testing)"
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f "project.zip" ]; then
            unzip -o project.zip -d extracted/
            SUBDIR=$(ls extracted/ | head -1)
            if [ -d "extracted/$SUBDIR/screens" ]; then
              cp -r extracted/$SUBDIR/. .
            else
              cp -r extracted/. .
            fi
            rm -rf extracted/
            echo "Unzipped OK"
          else
            echo "No zip - using repo files"
          fi
          
          # 🛠️ تحديد إصدار مستقر ومتوافق (3.11.0) بدلاً من تركه مفتوحاً لـ 3.14
          if [ -f "buildozer.spec" ]; then
            sed -i 's/python3==[0-9.]*/python3==3.11.0/g' buildozer.spec
            echo "✅ Adjusted python3 requirement to 3.11.0 in buildozer.spec"
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11.0
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip python3-dev \
            autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake build-essential \
            libsqlite3-dev sqlite3 \
            lld ccache patchelf \
            libglib2.0-dev libjpeg-dev libpng-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.37
          pip install virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-debug-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-debug-

      - name: Build DEBUG APK
        run: |
          # 🛠️ إضافة pipefail لمنع إخفاء الأخطاء الحقيقية بسبب tail
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tail -300
          echo "Build done"
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found"

      - name: Upload DEBUG APK
        uses: actions/upload-artifact@v4
        with:
          name: "DEBUG-APK-${{ github.run_number }}"
          path: bin/*-debug.apk
          retention-days: 30
          if-no-files-found: warn

  build-release:
    name: "Build Release APK (Google Play)"
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f "project.zip" ]; then
            unzip -o project.zip -d extracted/
            SUBDIR=$(ls extracted/ | head -1)
            if [ -d "extracted/$SUBDIR/screens" ]; then
              cp -r extracted/$SUBDIR/. .
            else
              cp -r extracted/. .
            fi
            rm -rf extracted/
          fi
          
          # 🛠️ تحديد إصدار مستقر ومتوافق (3.11.0) بدلاً من تركه مفتوحاً لـ 3.14
          if [ -f "buildozer.spec" ]; then
            sed -i 's/python3==[0-9.]*/python3==3.11.0/g' buildozer.spec
            echo "✅ Adjusted python3 requirement to 3.11.0 in buildozer.spec"
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11.0
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip python3-dev \
            autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake build-essential \
            libsqlite3-dev sqlite3 \
            lld ccache patchelf \
            libglib2.0-dev libjpeg-dev libpng-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.37
          pip install virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-release-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-release-

      - name: Setup keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_FILE_BASE64 missing!"
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > release.keystore
          echo "P4A_RELEASE_KEYSTORE=$(pwd)/release.keystore" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYSTORE_PASSWD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS_PASSWD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build RELEASE APK
        run: |
          # 🛠️ إضافة pipefail لمنع إخفاء الأخطاء الحقيقية بسبب tail
          set -o pipefail
          yes | buildozer -v android release 2>&1 | tail -200
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found"

      - name: Upload RELEASE APK
        uses: actions/upload-artifact@v4
        with:
          name: "RELEASE-APK-${{ github.run_number }}"
          path: bin/*-release.apk
          retention-days: 90
          if-no-files-found: error

      - name: Summary
        run: |
          echo "Version: $(grep '^version' buildozer.spec | cut -d= -f2 | tr -d ' ')"
          ls -lh bin/*-release.apk 2>/dev/null
          echo "Next: upload to play.google.com/console"
