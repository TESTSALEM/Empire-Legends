name: Build Travian Legends APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'both'
        type: choice
        options:
          - debug           # نسخة تجريبية فقط
          - release         # نسخة رسمية فقط
          - both            # كلاهما

jobs:
  # ============================================================
  # JOB 1: نسخة تجريبية DEBUG
  # ============================================================
  build-debug:
    name: "Build Debug APK (Testing)"
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f "project.zip" ]; then
            unzip -o project.zip -d extracted/
            SUBDIR=$(ls extracted/ | head -1)
            if [ -d "extracted/$SUBDIR/screens" ]; then
              cp -r extracted/$SUBDIR/. .
            else
              cp -r extracted/. .
            fi
            rm -rf extracted/
            echo "✅ Unzipped successfully"
          else
            echo "✅ No zip found - using repo files directly"
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip python3-dev \
            autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake build-essential \
            libsqlite3-dev sqlite3 \
            lld ccache patchelf \
            libglib2.0-dev libjpeg-dev libpng-dev

      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.37
          pip install virtualenv

      - name: Cache buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-debug-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-debug-

      - name: Build DEBUG APK
        run: |
          yes | buildozer -v android debug
          echo "✅ Debug build complete"
          ls -lh bin/*.apk 2>/dev/null || echo "❌ No APK found"

      - name: Upload DEBUG APK
        uses: actions/upload-artifact@v4
        with:
          name: "TravianLegends-DEBUG-${{ github.run_number }}"
          path: bin/*-debug.apk
          retention-days: 30
          if-no-files-found: warn

  # ============================================================
  # JOB 2: نسخة رسمية RELEASE (لـ Google Play)
  # ============================================================
  build-release:
    name: "Build Release APK (Google Play)"
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f "project.zip" ]; then
            unzip -o project.zip -d extracted/
            SUBDIR=$(ls extracted/ | head -1)
            if [ -d "extracted/$SUBDIR/screens" ]; then
              cp -r extracted/$SUBDIR/. .
            else
              cp -r extracted/. .
            fi
            rm -rf extracted/
            echo "✅ Unzipped successfully"
          else
            echo "✅ No zip found - using repo files directly"
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip python3-dev \
            autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake build-essential \
            libsqlite3-dev sqlite3 \
            lld ccache patchelf \
            libglib2.0-dev libjpeg-dev libpng-dev

      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip wheel
          pip install buildozer==1.5.0
          pip install cython==0.29.37
          pip install virtualenv

      - name: Cache buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-release-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-release-

      - name: Setup signing keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE_BASE64 }}" ]; then
            echo "❌ KEYSTORE_FILE_BASE64 missing from Secrets!"
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > travian_release.keystore
          echo "✅ Keystore ready: $(ls -lh travian_release.keystore)"
          echo "P4A_RELEASE_KEYSTORE=$(pwd)/travian_release.keystore" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYSTORE_PASSWD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS_PASSWD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build RELEASE APK
        run: |
          yes | buildozer -v android release
          echo "✅ Release build complete"
          ls -lh bin/*.apk 2>/dev/null || echo "❌ No APK found"

      - name: Upload RELEASE APK
        uses: actions/upload-artifact@v4
        with:
          name: "TravianLegends-RELEASE-${{ github.run_number }}"
          path: bin/*-release.apk
          retention-days: 90
          if-no-files-found: error

      - name: Build Summary
        run: |
          echo "========================================"
          echo "  ✅ Release APK Built Successfully!"
          echo "========================================"
          echo "  Version: $(grep '^version' buildozer.spec | cut -d= -f2 | tr -d ' ')"
          echo "  Size: $(ls -lh bin/*-release.apk 2>/dev/null | awk '{print $5}')"
          echo "  Next: Upload to Google Play Console"
          echo "  URL: https://play.google.com/console"
          echo "========================================"
