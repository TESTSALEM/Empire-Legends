name: Build Android APK (Unzip Mode)
on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # فك ضغط مشروعك داخل الخادم السحابي
      - name: Unzip Project Files
        run: |
          unzip project.zip
          # إذا فك الضغط داخل مجلد فرعي، انقل الملفات للمسار الرئيسي
          mv */* . 2>/dev/null || true 

      # خطوة تلقائية لحل مشكلة تعارض إصدار البايثون وتثبيت الأدوات
      - name: Auto Patch Buildozer Specs
        run: |
          sed -i 's/python3==3.11.9/python3/g' buildozer.spec
          sed -i '/android.sdk/a android.build_tools_version = 33.0.0' buildozer.spec

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # تثبيت كامل الحزم والمكتبات التطويرية وحزم الصور + تقييد إصدار Cython
      - name: Install Buildozer and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev libsqlite3-dev lld autoconf automake libtool pkg-config cmake zlib1g-dev libncurses5-dev libncursesw5-dev libgdbm-dev libreadline-dev libbz2-dev liblzma-dev uuid-dev libjpeg-dev libpng-dev
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      - name: Build APK with Buildozer
        env:
          # ربط الأسرار بمتغيرات نظام أندرويد الرسمية
          P4A_RELEASE_KEYSTORE: travian_release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # إعادة توليد مفتاح التوقيع من السر المشفر الخاص بك
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > travian_release.keystore
          
          echo "🚀 جاري البناء وتجميع المكتبات في الخلفية (تم تنظيف الشاشة)..."
          
          # تشغيل البناء وحفظ المخرجات بالكامل في ملف نصي جانبي
          yes | buildozer android release > buildozer.log 2>&1 || {
            echo "------------------------------------------------------------------"
            echo "❌ فشل البناء! إليك الأسطر الأخيرة المسببة للمشكلة الحقيقية:"
            echo "------------------------------------------------------------------"
            
            # عرض آخر 250 سطر فقط وهي التي تحتوي على كود الخطأ الصافي
            tail -n 250 buildozer.log
            exit 1
          }
          
          echo "✅ تم البناء بنجاح وبدون أي مشاكل!"
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Travian-Legends-Release-APK
          path: bin/*.apk
