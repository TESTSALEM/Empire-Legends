name: Build Travian Legends APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build-debug:
    name: "Build Debug APK (Testing)"
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f "project.zip" ]; then
            unzip -o project.zip -d extracted/
            SUBDIR=$(ls extracted/ | head -1)
            if [ -d "extracted/$SUBDIR/screens" ]; then
              cp -r extracted/$SUBDIR/. .
            else
              cp -r extracted/. .
            fi
            rm -rf extracted/
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11.0
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.0'

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install buildozer==1.5.0
          python -m pip install cython==0.29.37
          python -m pip install virtualenv

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-dev autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake build-essential libsqlite3-dev sqlite3 \
            lld ccache patchelf libglib2.0-dev libjpeg-dev libpng-dev

      # 1️⃣ استعادة الـ cache (SDK + NDK + p4a فقط - بدون build folder)
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
            ~/.buildozer/android/platform/python-for-android
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-deps-

      # 2️⃣ مسح المسار الحقيقي للـ venv التالف
      - name: Fix corrupted venv
        run: |
          # المسار الحقيقي للـ venv التالف
          rm -rf ~/.buildozer/android/platform/build-*/build/venv 2>/dev/null || true
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a 2>/dev/null || true
          echo "Removed corrupted build directories"
          echo "Remaining venv dirs: $(find ~/.buildozer -name 'venv' -type d 2>/dev/null | wc -l)"

      # 3️⃣ البناء
      - name: Build DEBUG APK
        run: |
          python --version
          yes | buildozer -v android debug 2>&1 | tee debug_build_log.txt
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found"

      - name: Show errors
        if: always()
        run: |
          echo "=== ERRORS ==="
          grep -i "importerror\|error\|failed\|traceback" debug_build_log.txt \
            | grep -v "^#\|GITHUB_\|RUNNER_" | tail -20
          echo "=== LAST 20 LINES ==="
          tail -20 debug_build_log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "DEBUG-LOG-${{ github.run_number }}"
          path: debug_build_log.txt
          retention-days: 7

      - name: Upload DEBUG APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "DEBUG-APK-${{ github.run_number }}"
          path: bin/*-debug.apk
          retention-days: 30
          if-no-files-found: warn

  build-release:
    name: "Build Release APK (Google Play)"
    runs-on: ubuntu-22.04
    if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f "project.zip" ]; then
            unzip -o project.zip -d extracted/
            SUBDIR=$(ls extracted/ | head -1)
            if [ -d "extracted/$SUBDIR/screens" ]; then
              cp -r extracted/$SUBDIR/. .
            else
              cp -r extracted/. .
            fi
            rm -rf extracted/
          fi
          ls -la

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11.0
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.0'

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install buildozer==1.5.0
          python -m pip install cython==0.29.37
          python -m pip install virtualenv

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-dev autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake build-essential libsqlite3-dev sqlite3 \
            lld ccache patchelf libglib2.0-dev libjpeg-dev libpng-dev

      # 1️⃣ استعادة الـ cache
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
            ~/.buildozer/android/platform/python-for-android
            ~/.buildozer/android/packages
          key: buildozer-deps-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-deps-

      # 2️⃣ مسح المسار الحقيقي للـ venv التالف
      - name: Fix corrupted venv
        run: |
          rm -rf ~/.buildozer/android/platform/build-*/build/venv 2>/dev/null || true
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a 2>/dev/null || true
          echo "Removed corrupted build directories"

      - name: Setup keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_FILE_BASE64 missing!"
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > release.keystore
          echo "P4A_RELEASE_KEYSTORE=$(pwd)/release.keystore" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYSTORE_PASSWD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS_PASSWD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # 3️⃣ البناء
      - name: Build RELEASE APK
        run: |
          python --version
          yes | buildozer -v android release 2>&1 | tee release_build_log.txt
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found"

      - name: Show errors
        if: always()
        run: |
          echo "=== ERRORS ==="
          grep -i "importerror\|error\|failed\|traceback" release_build_log.txt \
            | grep -v "^#\|GITHUB_\|RUNNER_" | tail -20
          echo "=== LAST 20 LINES ==="
          tail -20 release_build_log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "RELEASE-LOG-${{ github.run_number }}"
          path: release_build_log.txt
          retention-days: 7

      - name: Upload RELEASE APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "RELEASE-APK-${{ github.run_number }}"
          path: bin/*-release.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          echo "Version: $(grep '^version' buildozer.spec | cut -d= -f2 | tr -d ' ')"
          ls -lh bin/*.apk 2>/dev/null || echo "No APK yet"
