name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3 python3-pip python3-dev \
            autoconf automake libtool \
            pkg-config libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake build-essential \
            libsqlite3-dev sqlite3 \
            lld ccache patchelf \
            libglib2.0-dev libjpeg-dev libpng-dev

      - name: Install buildozer
        run: |
          pip3 install --upgrade pip wheel
          pip3 install buildozer==1.5.0
          pip3 install cython==0.29.37
          pip3 install virtualenv

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-release-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-release-

      - name: Setup keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE_BASE64 }}" ]; then
            echo "ERROR: KEYSTORE_FILE_BASE64 missing from Secrets!"
            exit 1
          fi
          echo "${{ secrets.KEYSTORE_FILE_BASE64 }}" | base64 -d > release.keystore
          echo "P4A_RELEASE_KEYSTORE=$(pwd)/release.keystore" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYSTORE_PASSWD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "P4A_RELEASE_KEYALIAS_PASSWD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build RELEASE APK
        run: |
          yes | buildozer -v android release 2>&1 | tail -200
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: RELEASE-APK-${{ github.run_number }}
          path: bin/*-release.apk
          retention-days: 90
          if-no-files-found: error
